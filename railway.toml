[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npx turbo build --filter=@amazon-inventory/api..."

[deploy]
startCommand = "npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
